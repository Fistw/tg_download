<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tg-download 监控看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .card {
            backdrop-filter: blur(10px);
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(100, 116, 139, 0.3);
        }
        .glow-green {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }
        .glow-blue {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-active {
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .table-row:hover {
            background: rgba(51, 65, 85, 0.5);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- 头部 -->
        <header class="mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">
                        📊 tg-download 监控看板
                    </h1>
                    <p class="text-slate-400 mt-2">实时监控下载和上传状态</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 text-sm">
                        <span class="status-dot status-active"></span>
                        <span class="text-green-400">服务运行中</span>
                    </div>
                    <button onclick="refreshData()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        刷新
                    </button>
                </div>
            </div>
        </header>

        <!-- 概览卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <!-- 下载统计 -->
            <div class="card rounded-xl p-6 glow-green">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-slate-400 text-sm font-medium uppercase tracking-wider">下载统计</h3>
                    <div class="text-3xl">⬇️</div>
                </div>
                <div class="text-3xl font-bold text-green-400" id="download-total">0</div>
                <div class="flex gap-4 mt-3 text-sm">
                    <div><span class="text-slate-400">活跃:</span> <span id="download-active" class="text-yellow-400">0</span></div>
                    <div><span class="text-slate-400">完成:</span> <span id="download-completed" class="text-green-400">0</span></div>
                </div>
                <div class="mt-3">
                    <span class="text-slate-400 text-sm">平均速度: </span>
                    <span class="text-blue-300 font-medium" id="download-avg-speed">0 KB/s</span>
                </div>
            </div>

            <!-- 上传统计 -->
            <div class="card rounded-xl p-6 glow-blue">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-slate-400 text-sm font-medium uppercase tracking-wider">上传统计</h3>
                    <div class="text-3xl">⬆️</div>
                </div>
                <div class="text-3xl font-bold text-blue-400" id="upload-total">0</div>
                <div class="flex gap-4 mt-3 text-sm">
                    <div><span class="text-slate-400">活跃:</span> <span id="upload-active" class="text-yellow-400">0</span></div>
                    <div><span class="text-slate-400">完成:</span> <span id="upload-completed" class="text-green-400">0</span></div>
                </div>
                <div class="mt-3">
                    <span class="text-slate-400 text-sm">平均速度: </span>
                    <span class="text-blue-300 font-medium" id="upload-avg-speed">0 KB/s</span>
                </div>
            </div>

            <!-- 系统内存 -->
            <div class="card rounded-xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-slate-400 text-sm font-medium uppercase tracking-wider">内存使用</h3>
                    <div class="text-3xl">🧠</div>
                </div>
                <div class="text-3xl font-bold text-purple-400" id="memory-percent">0%</div>
                <div class="mt-4 h-2 bg-slate-700 rounded-full overflow-hidden">
                    <div id="memory-bar" class="h-full bg-gradient-to-r from-purple-500 to-pink-500" style="width: 0%"></div>
                </div>
            </div>

            <!-- 系统 CPU -->
            <div class="card rounded-xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-slate-400 text-sm font-medium uppercase tracking-wider">CPU 使用</h3>
                    <div class="text-3xl">⚡</div>
                </div>
                <div class="text-3xl font-bold text-orange-400" id="cpu-percent">0%</div>
                <div class="mt-4 h-2 bg-slate-700 rounded-full overflow-hidden">
                    <div id="cpu-bar" class="h-full bg-gradient-to-r from-orange-500 to-red-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- 健康检查卡片 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <!-- 服务健康状态 -->
            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-bold mb-4 text-slate-200 flex items-center gap-2">
                    <span id="health-status-icon">🟢</span> 服务健康状态
                </h2>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <span class="text-slate-400 text-sm">24小时检查次数:</span>
                        <div class="text-2xl font-bold text-cyan-400" id="health-total-checks">0</div>
                    </div>
                    <div>
                        <span class="text-slate-400 text-sm">24小时失败次数:</span>
                        <div class="text-2xl font-bold text-yellow-400" id="health-failed-checks">0</div>
                    </div>
                </div>
                <div class="text-sm text-slate-400" id="health-last-success">
                    最后成功: -
                </div>
            </div>

            <!-- 恢复历史 -->
            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-bold mb-4 text-slate-200 flex items-center gap-2">
                    <span>🔄</span> 恢复历史
                </h2>
                <div class="space-y-2" id="recovery-history">
                    <p class="text-slate-500 text-sm">暂无恢复记录</p>
                </div>
            </div>
        </div>

        <!-- 图表部分 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <!-- 下载速度图表 -->
            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-bold text-green-400 mb-4 flex items-center gap-2">
                    <span>⬇️</span> 下载速度趋势
                </h2>
                <div class="h-64">
                    <canvas id="downloadChart"></canvas>
                </div>
            </div>

            <!-- 上传速度图表 -->
            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-bold text-blue-400 mb-4 flex items-center gap-2">
                    <span>⬆️</span> 上传速度趋势
                </h2>
                <div class="h-64">
                    <canvas id="uploadChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 历史记录 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- 下载历史 -->
            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-bold mb-4 text-slate-200 flex items-center gap-2">
                    <span>📥</span> 下载历史
                </h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-slate-400 border-b border-slate-700">
                                <th class="text-left py-2 px-1">文件名</th>
                                <th class="text-right py-2 px-1">大小</th>
                                <th class="text-right py-2 px-1">速度</th>
                                <th class="text-right py-2 px-1">状态</th>
                            </tr>
                        </thead>
                        <tbody id="download-table">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 上传历史 -->
            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-bold mb-4 text-slate-200 flex items-center gap-2">
                    <span>📤</span> 上传历史
                </h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-slate-400 border-b border-slate-700">
                                <th class="text-left py-2 px-1">文件名</th>
                                <th class="text-right py-2 px-1">大小</th>
                                <th class="text-right py-2 px-1">速度</th>
                                <th class="text-right py-2 px-1">状态</th>
                            </tr>
                        </thead>
                        <tbody id="upload-table">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 页脚 -->
        <footer class="mt-8 text-center text-slate-500 text-sm">
            <p>最后更新: <span id="last-updated">-</span></p>
        </footer>
    </div>

    <script src="/static/dashboard/dashboard.js"></script>
</body>
</html>
