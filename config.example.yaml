telegram:
  api_id: 12345
  api_hash: "your_api_hash"
  bot_token: "your_bot_token"
  session_name: "user_session"

download:
  output_dir: "./downloads"
  max_concurrent: 3  # 同时下载的最大文件数
  chunk_size_kb: 512  # 下载块大小（KB）
  enable_reaction_download: false
  send_download_to_allowed_users: true
  ask_before_send: true  # 下载后是否询问用户再发送文件
  ask_timeout_seconds: 300  # 询问超时时间（秒）
  # 重试策略配置
  max_retries: 5  # 最大重试次数
  retry_base_delay: 1.0  # 基础重试延迟（秒）
  retry_max_delay: 60.0  # 最大重试延迟（秒）
  # 自动恢复配置
  auto_resume: true  # 是否自动恢复中断的下载
  # 缓存清理配置
  enable_cache_cleanup: true  # 是否启用自动缓存清理
  cache_retention_days: 3  # 缓存文件保留天数
  max_cache_size_gb: 8.0  # 最大缓存大小（GB）
  # 连接池配置
  connection_pool_size: 1  # 连接池大小（单个账号建议不超过3-5个连接）
  # 分片下载配置（实验性功能）
  enable_chunked_download: false  # 是否启用分片下载
  chunk_size_mb: 50  # 每个分片的大小（MB）
  max_concurrent_chunks: 3  # 最大并发下载分片数
  # 上传配置（优化上传速度）
  upload_part_size_kb: 128  # 上传分块大小（KB），默认 128，最大 512
  upload_large_file_threshold_mb: 500  # 大文件阈值（MB），超过此值使用优化配置
  upload_large_file_part_size_kb: 512  # 大文件上传分块大小（KB），建议设置为 512

# WebDAV 服务器配置（用于群晖 NAS 访问）
webdav_server:
  enable: false
  host: "0.0.0.0"
  port: 8080
  mount_path: "/"
  username: ""  # WebDAV 用户名（留空则不启用认证）
  password: ""  # WebDAV 密码
  directory: ""  # 留空则使用 download.output_dir

# NAS 同步配置（可选，下载后自动上传到 NAS）
nas_sync:
  enable: false
  sync_type: "webdav"  # "webdav" 或 "sftp"
  # WebDAV 配置（如果 sync_type 是 "webdav"）
  webdav_url: ""
  webdav_username: ""
  webdav_password: ""
  webdav_remote_path: "/"
  # SFTP 配置（如果 sync_type 是 "sftp"）
  sftp_host: ""
  sftp_port: 22
  sftp_username: ""
  sftp_password: ""
  sftp_remote_path: "/"
  sftp_key_path: ""  # 可选，使用密钥认证
  # 通用配置
  max_retries: 3
  retry_delay_seconds: 5
  delete_after_sync: false  # 同步后是否删除本地文件

monitor:
  channels: []
  filters:
    min_size_mb: 0
    max_size_mb: 4096
    keywords: []

bot:
  allowed_users: []

logging:
  log_dir: "./logs"
  max_file_size_mb: 10
  retention_days: 7
  filename: "tg_download.log"
