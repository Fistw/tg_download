telegram:
  api_id: 12345
  api_hash: "your_api_hash"
  bot_token: "your_bot_token"
  session_name: "user_session"

download:
  output_dir: "./downloads"
  max_concurrent: 5  # 同时下载的最大文件数，建议 5-10
  chunk_size_kb: 2048  # 下载块大小（KB），建议 2048（最快）
  enable_reaction_download: false
  send_download_to_allowed_users: true

monitor:
  channels: []
  filters:
    min_size_mb: 0
    max_size_mb: 4096
    keywords: []

bot:
  allowed_users: []

logging:
  log_dir: "./logs"
  max_file_size_mb: 10
  retention_days: 7
  filename: "tg_download.log"
